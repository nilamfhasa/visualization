<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molecule Mayhem - The Gas Chamber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { background: #080c14; color: #fff; margin: 0; font-family: 'Sora', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
    
    .game-viewport { 
      flex: 1;
      width: 100vw; 
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    }



    .canvas-wrapper {
      position: relative;
      border: 4px solid #333;
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      background: #000;
    }
    canvas { display: block; background: #0a0d14; cursor: crosshair; border-radius: 8px; }
    
    /* Overlay */
    .game-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(8px);
      border-radius: 8px;
    }
    .overlay-content { text-align: center; }
    .overlay-content h1 { font-family: 'Space Mono', monospace; font-size: 48px; color: #00d2ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 4px; }
    .start-btn {
      background: #00d2ff; color: #000; border: none; padding: 15px 50px;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 18px;
      border-radius: 8px; cursor: pointer; transition: 0.2s;
    }
    .start-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(0,210,255,0.5); }
    
    .nav-back { position: absolute; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <a href="../index.html" class="nav-logo">VSEPR<span>3D</span></a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Home</a>
      <a href="index.html" class="nav-link active">Game</a>
      <a href="../quiz/index.html" class="nav-link">Quiz</a>
      <a href="../about/index.html" class="nav-link">About</a>
    </div>
  </nav>

  <div class="game-viewport">
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div id="gameContainer" class="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="gameOverlay" class="game-overlay">
          <div class="overlay-content">
            <h1>THE RUST TOWER</h1>
            <p style="margin-bottom: 25px; color: #aaa;">Misi: Taklukkan Menara Karat & Capai Pintu Exit!</p>
            <input type="text" id="playerNameInput" placeholder="Masukkan Nama Pemain..." maxlength="20" style="display: block; width: 300px; margin: 0 auto 25px auto; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid #444; border-radius: 30px; background: rgba(255, 255, 255, 0.05); color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); outline: none; transition: 0.3s;" onfocus="this.style.borderColor='#00d2ff'; this.style.boxShadow='0 0 15px rgba(0,210,255,0.3)';" onblur="this.style.borderColor='#444'; this.style.boxShadow='0 5px 15px rgba(0,0,0,0.3)';" />
            <button id="btnStart" class="start-btn">MASUK MENARA</button>
          </div>
        </div>
      </div>

      <!-- PANDUAN KONTROL -->
      <div class="control-guide" style="width: 800px; box-sizing: border-box; margin-top: 15px; display: flex; justify-content: space-around; align-items: center; padding: 12px 20px; background: rgba(20, 25, 35, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; backdrop-filter: blur(10px); font-family: 'Space Mono', monospace; font-size: 11px; color: #bdc3c7; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div>🎮 <span style="color: #fff; font-weight: bold;">GERAKAN:</span> WASD / ← ↑ ↓ →</div>
        <div>🧪 <span style="color: #00d2ff; font-weight: bold;">SWAP MOLEKUL:</span> Tombol C (Change Power)</div>
        <div>🚀 <span style="color: #f1c40f; font-weight: bold;">RESTART RUN:</span> Tombol Spacebar</div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
